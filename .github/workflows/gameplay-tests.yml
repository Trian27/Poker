name: Gameplay Tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  gameplay-scope:
    runs-on: ubuntu-latest
    outputs:
      run_gameplay_jobs: ${{ steps.scope.outputs.run_gameplay_jobs }}
      reason: ${{ steps.scope.outputs.reason }}
      matching_paths_json: ${{ steps.scope.outputs.matching_paths_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect pull request changed files
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p .tmp
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only FETCH_HEAD...HEAD > .tmp/gameplay-changed-files.txt
      - name: Evaluate gameplay workflow scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python3 -m scripts.gameplay_workflow_scope \
              --event-name pull_request \
              --changed-files-file .tmp/gameplay-changed-files.txt \
              --github-output "$GITHUB_OUTPUT"
          else
            {
              echo "run_gameplay_jobs=true"
              echo "reason=non-pull_request events always run gameplay jobs"
              echo 'matching_paths_json=[]'
            } >> "$GITHUB_OUTPUT"
          fi

  gameimplementation:
    needs: gameplay-scope
    if: github.event_name != 'pull_request' || needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: GameImplementation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: GameImplementation/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --runInBand
      - run: npm run test:gameplay

  poker-api-gameplay:
    needs: gameplay-scope
    if: github.event_name != 'pull_request' || needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: poker-api
    env:
      TEST_DATABASE_BASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      ENV_MODE: dev
      GAME_SERVER_URL: http://game-server:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest -m gameplay tests/gameplay/test_tables_gameplay.py -q

  poker-ui:
    needs: gameplay-scope
    if: github.event_name != 'pull_request' || needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: poker-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: poker-ui/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e:gameplay
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: poker-ui-playwright-results
          path: |
            poker-ui/test-results
            poker-ui/playwright-report
          if-no-files-found: ignore

  gameimplementation-chaos:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: GameImplementation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: GameImplementation/package-lock.json
      - run: npm ci
      - run: npm run test:chaos

  compose-browser-pr-smoke:
    name: compose-browser-pr-smoke
    needs: gameplay-scope
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: compose-browser-pr-smoke-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    env:
      COMPOSE_PROJECT_NAME: gameplay-browser-pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Skip compose-browser-pr-smoke on non-gameplay PR
        if: github.event_name == 'pull_request' && needs.gameplay-scope.outputs.run_gameplay_jobs != 'true'
        run: |
          echo "compose-browser-pr-smoke not required for this PR."
          echo "Reason: ${{ needs.gameplay-scope.outputs.reason }}"
          echo "Matching gameplay paths: ${{ needs.gameplay-scope.outputs.matching_paths_json }}"
      - uses: actions/checkout@v4
        if: needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
      - uses: actions/setup-node@v4
        if: needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: poker-ui/package-lock.json
      - run: npm ci
        if: needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
        working-directory: poker-ui
      - run: npx playwright install --with-deps chromium
        if: needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
        working-directory: poker-ui
      - run: ./scripts/test-gameplay.sh compose-browser-pr-smoke
        if: needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
      - if: failure() && needs.gameplay-scope.outputs.run_gameplay_jobs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: compose-browser-pr-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/compose-browser-pr-smoke
          if-no-files-found: ignore

  compose-browser-queue-pr:
    name: compose-browser-queue-pr
    needs: [gameplay-scope, compose-browser-pr-smoke]
    if: (github.event_name == 'pull_request' || github.event_name == 'merge_group') && needs.gameplay-scope.outputs.run_gameplay_jobs == 'true' && needs['compose-browser-pr-smoke'].result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: compose-browser-queue-pr-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    env:
      COMPOSE_PROJECT_NAME: gameplay-browser-queue-pr-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: poker-ui/package-lock.json
      - run: npm ci
        working-directory: poker-ui
      - run: npx playwright install --with-deps chromium
        working-directory: poker-ui
      - run: ./scripts/test-gameplay.sh compose-browser-queue-pr
      - name: Emit queue PR readiness metadata
        if: ${{ always() }}
        run: |
          python3 -m scripts.browser_lane_readiness_metadata \
            --mode compose-browser-queue-pr \
            --artifact-root logs/compose-browser-queue-pr \
            --output logs/compose-browser-queue-pr/queue-readiness-metadata.json
      - name: Upload queue PR readiness metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: compose-browser-queue-pr-readiness-metadata-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/compose-browser-queue-pr/queue-readiness-metadata.json
          if-no-files-found: error
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-browser-queue-pr-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/compose-browser-queue-pr
          if-no-files-found: ignore

  compose-autonomous-e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: gameplay-compose-e2e
      cancel-in-progress: false
    env:
      PYTHON_BIN: python
      COMPOSE_PROJECT_NAME: gameplay-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r poker-agent-api/requirements.txt
      - run: ./scripts/test-gameplay.sh compose-autonomous
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-autonomous-e2e-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/compose-autonomous
          if-no-files-found: ignore

  compose-browser-e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: gameplay-compose-e2e
      cancel-in-progress: false
    env:
      COMPOSE_PROJECT_NAME: gameplay-browser-e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: poker-ui/package-lock.json
      - run: npm ci
        working-directory: poker-ui
      - run: npx playwright install --with-deps chromium
        working-directory: poker-ui
      - run: ./scripts/test-gameplay.sh compose-browser-e2e
      - name: Emit heavy queue readiness metadata
        if: ${{ always() }}
        run: |
          python3 -m scripts.browser_lane_readiness_metadata \
            --mode compose-browser-e2e \
            --artifact-root logs/compose-browser-e2e \
            --output logs/compose-browser-e2e/queue-readiness-metadata.json
      - name: Upload heavy queue readiness metadata
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: compose-browser-e2e-queue-readiness-metadata-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/compose-browser-e2e/queue-readiness-metadata.json
          if-no-files-found: error
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-browser-e2e-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/compose-browser-e2e
          if-no-files-found: ignore
