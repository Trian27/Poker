<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <filter id="felt-depth" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.22"
        numOctaves="3"
        seed="64"
        stitchTiles="stitch"
        result="depthNoise"
      />
      <feColorMatrix
        in="depthNoise"
        type="matrix"
        values="
          0 0 0 0 0.09
          0 0 0 0 0.20
          0 0 0 0 0.13
          0 0 0 1 0"
        result="depthToned"
      />
      <feComponentTransfer in="depthToned" result="depthAdjusted">
        <feFuncR type="gamma" amplitude="1.14" exponent="0.72" offset="0" />
        <feFuncG type="gamma" amplitude="1.14" exponent="0.72" offset="0" />
        <feFuncB type="gamma" amplitude="1.14" exponent="0.72" offset="0" />
      </feComponentTransfer>
    </filter>
    <filter id="felt-base" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.92"
        numOctaves="6"
        seed="91"
        stitchTiles="stitch"
        result="noiseBase"
      />
      <feColorMatrix
        in="noiseBase"
        type="matrix"
        values="
          0 0 0 0 0.18
          0 0 0 0 0.40
          0 0 0 0 0.22
          0 0 0 1 0"
        result="greenNoise"
      />
      <feComponentTransfer in="greenNoise" result="baseAdjusted">
        <feFuncR type="gamma" amplitude="1.12" exponent="0.74" offset="0" />
        <feFuncG type="gamma" amplitude="1.12" exponent="0.74" offset="0" />
        <feFuncB type="gamma" amplitude="1.12" exponent="0.74" offset="0" />
      </feComponentTransfer>
    </filter>
    <filter id="felt-speckle" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="4.4"
        numOctaves="3"
        seed="17"
        stitchTiles="stitch"
        result="speckleRaw"
      />
      <feColorMatrix in="speckleRaw" type="saturate" values="0" result="speckleMono" />
      <feComponentTransfer in="speckleMono" result="speckleToned">
        <feFuncR type="table" tableValues="0 0.08 0.22 0.4 0.58 0.76 0.92 1" />
        <feFuncG type="table" tableValues="0 0.08 0.22 0.4 0.58 0.76 0.92 1" />
        <feFuncB type="table" tableValues="0 0.08 0.22 0.4 0.58 0.76 0.92 1" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="96" height="96" fill="#2d623a" />
  <rect width="96" height="96" filter="url(#felt-depth)" opacity="0.4" />
  <rect width="96" height="96" filter="url(#felt-base)" opacity="0.82" />
  <rect width="96" height="96" filter="url(#felt-speckle)" opacity="0.36" />
</svg>
